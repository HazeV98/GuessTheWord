<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE SURVIVAL QUIZ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #02040a;
            --panel: rgba(13, 17, 23, 0.8);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff007a;
            --danger: #ff3e3e;
            --success: #00ff88;
            --text: #e6edf3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #161b22 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #0d1117 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- ANIMAZIONI --- */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
            50% { box-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes flipIn {
            from { transform: rotateX(90deg); opacity: 0; }
            to { transform: rotateX(0deg); opacity: 1; }
        }

        /* --- LAYOUT --- */
        .container { width: 95%; max-width: 1400px; transition: all 0.5s ease; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
        }

        .hidden { display: none !important; }

        /* --- SETUP SCREEN --- */
        #setup-ui h1 { font-weight: 900; letter-spacing: -2px; color: var(--primary); text-align: center; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .player-input-row { 
            display: flex; gap: 10px; background: var(--glass); padding: 15px; border-radius: 15px; align-items: center;
            border: 1px solid var(--border);
        }
        input, select {
            background: #0d1117; color: white; border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; font-family: inherit;
        }
        button {
            cursor: pointer; border: none; border-radius: 12px; font-weight: bold;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; padding: 15px 30px; }
        .btn-primary:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- GAME BOARD --- */
        #game-ui { text-align: center; }
        #turn-announcement { font-size: 1.5rem; color: var(--primary); font-weight: 900; margin-bottom: 10px; }
        
        #definition { 
            font-size: 2rem; margin: 20px 0; min-height: 4rem; font-weight: 400; color: #adbac7;
            max-width: 800px; margin-left: auto; margin-right: auto;
        }

        #word-display {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 40px 0;
            font-family: 'JetBrains Mono', monospace;
        }
        .letter {
            width: 60px; height: 80px; background: var(--glass); border: 2px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; animation: flipIn 0.4s forwards;
        }
        .letter.revealed { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }

        /* --- PLAYERS GRID --- */
        .players-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-top: 50px;
        }
        .p-card {
            background: var(--glass); padding: 20px; border-radius: 20px; border: 2px solid var(--border);
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .p-card.active { border-color: var(--primary); animation: glowPulse 2s infinite; background: rgba(0, 242, 255, 0.05); }
        .p-card.active .p-time { color: var(--primary); font-size: 2.5rem; }
        .p-card.dead { opacity: 0.3; filter: grayscale(1); border-style: dashed; }
        .p-name { font-weight: 900; text-transform: uppercase; font-size: 1rem; color: #8b949e; }
        .p-time { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 800; margin-top: 5px; }
        .p-diff { font-size: 0.7rem; opacity: 0.5; margin-top: 5px; }

        /* --- HOST CONSOLE --- */
        .host-controls { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #000; 
            padding: 20px; display: flex; justify-content: center; gap: 20px;
            border-top: 1px solid var(--border); z-index: 100;
        }
        .btn-action { padding: 20px 40px; font-size: 1.2rem; }
        .btn-ok { background: var(--success); color: #000; }
        .btn-skip { background: var(--danger); color: #fff; }

        /* Mobile specific */
        @media (max-width: 768px) {
            .setup-grid { grid-template-columns: 1fr; }
            .letter { width: 40px; height: 55px; font-size: 1.5rem; }
            #definition { font-size: 1.2rem; }
            .players-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-ui" class="panel">
        <h1>ULTIMATE SURVIVAL</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <input type="text" id="room-id" placeholder="Codice Stanza (es. 1234)" style="font-size: 1.5rem; text-align: center; width: 250px;">
        </div>
        
        <div id="host-setup" class="hidden">
            <div style="background: var(--glass); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                <label>TEMPO BASE (secondi):</label>
                <input type="number" id="base-time" value="120" style="width: 80px;">
            </div>
            <div id="player-list-setup">
                </div>
            <button onclick="addPlayerField()" class="btn-host" style="background:#333; color:white; padding:10px; margin-top:10px;">+ AGGIUNGI GIOCATORE</button>
            <div style="margin-top: 40px; text-align: center;">
                <button class="btn-primary" onclick="createGame()">CREA E INIZIA PARTITA</button>
            </div>
        </div>

        <div id="player-waiting" class="hidden">
            <h2 style="text-align: center;">PARTITA IN PREPARAZIONE...</h2>
            <div id="waiting-list" class="players-grid"></div>
            <div style="margin-top: 30px; text-align: center;">
                <button class="btn-primary" onclick="joinGame()">UNISCITI ALLA STANZA</button>
            </div>
        </div>

        <div id="initial-choice" style="text-align: center; margin-top: 20px;">
            <button class="btn-primary" onclick="showHost()">SONO IL CONDUTTORE</button>
            <button class="btn-host" onclick="showPlayer()" style="background:#222; color:white; padding:15px 30px;">SONO IL GIOCATORE / TV</button>
        </div>
    </div>

    <div id="game-ui" class="panel hidden">
        <div id="turn-announcement">CARICAMENTO...</div>
        <div id="definition">"Definizione della parola..."</div>
        <div id="word-display"></div>
        <div class="players-grid" id="players-board"></div>
    </div>

    <div id="host-console" class="host-controls hidden">
        <div id="host-solution" style="color: var(--primary); font-family: monospace; font-size: 2rem; margin-right: 40px; display: flex; align-items: center;">SOLUZIONE</div>
        <button class="btn-action btn-ok" onclick="handleAction('CORRECT')">CORRETTO</button>
        <button class="btn-action btn-skip" onclick="handleAction('SKIP')">SALTA (-3s)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAXecjrbGuwam5h4Xqn9HrT249h0L3v4n8",
        authDomain: "giochi-c0de1.firebaseapp.com",
        projectId: "giochi-c0de1",
        storageBucket: "giochi-c0de1.firebasestorage.app",
        messagingSenderId: "661832078313",
        appId: "1:661832078313:web:6e145cd3cce589598a7178"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- VARIABILI GLOBALI ---
    let ROLE = ''; // 'host' o 'player'
    let ROOM = '';
    let DB_LOCAL = {};
    let GAME_STATE = null;
    let revealInterval = null;
    let timerInterval = null;
    let audioCtx = null;

    // --- AUDIO SYNTH ---
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        switch(type) {
            case 'tick':
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
                break;
            case 'reveal':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
                break;
            case 'correct':
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(); osc.stop(now + 0.4);
                break;
            case 'skip':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
                break;
        }
    }

    // --- CARICAMENTO JSON ---
    async function fetchDatabase() {
        const r = await fetch('parole.json');
        DB_LOCAL = await r.json();
    }
    fetchDatabase();

    // --- UI SWITCHES ---
    window.showHost = () => {
        ROLE = 'host';
        document.getElementById('initial-choice').classList.add('hidden');
        document.getElementById('host-setup').classList.remove('hidden');
        addPlayerField(); addPlayerField(); // Inizia con 2
    };

    window.showPlayer = () => {
        ROLE = 'player';
        document.getElementById('initial-choice').classList.add('hidden');
        document.getElementById('player-waiting').classList.remove('hidden');
    };

    window.addPlayerField = () => {
        const div = document.createElement('div');
        div.className = 'player-input-row';
        div.innerHTML = `
            <input type="text" class="setup-name" placeholder="Nome Giocatore">
            <select class="setup-diff">
                <option value="database_bambino">Bambino</option>
                <option value="database_adulto">Adulto</option>
            </select>
            <input type="number" class="setup-extra" placeholder="+ sec" style="width:60px">
        `;
        document.getElementById('player-list-setup').appendChild(div);
    };

    // --- CORE LOGIC ---
    window.createGame = async () => {
        ROOM = document.getElementById('room-id').value;
        if (!ROOM) return alert("Metti un codice stanza!");

        const base = parseInt(document.getElementById('base-time').value);
        const players = [];
        document.querySelectorAll('.player-input-row').forEach(row => {
            const name = row.querySelector('.setup-name').value;
            const diff = row.querySelector('.setup-diff').value;
            const extra = parseInt(row.querySelector('.setup-extra').value) || 0;
            if (name) {
                players.push({
                    name: name,
                    diff: diff,
                    time: base + extra,
                    alive: true
                });
            }
        });

        const initialState = {
            status: 'LIVE',
            turn: 0,
            players: players,
            currentWord: { p: '', d: '', mask: '' },
            lastAction: 'INIT'
        };

        await set(ref(db, 'rooms/' + ROOM), initialState);
        initSync();
        pickNewWord();
    };

    window.joinGame = () => {
        ROOM = document.getElementById('room-id').value;
        if (!ROOM) return alert("Metti un codice stanza!");
        initSync();
    };

    function initSync() {
        onValue(ref(db, 'rooms/' + ROOM), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            const oldWord = GAME_STATE?.currentWord?.p;
            GAME_STATE = data;

            if (data.status === 'LIVE') {
                document.getElementById('setup-ui').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                if (ROLE === 'host') document.getElementById('host-console').classList.remove('hidden');
                
                if (oldWord !== data.currentWord.p) playSound('reveal');
                renderGame();
            }
        });
    }

    function pickNewWord() {
        const turnIdx = GAME_STATE.turn;
        const player = GAME_STATE.players[turnIdx];
        const pool = DB_LOCAL[player.diff];
        const pick = pool[Math.floor(Math.random() * pool.length)];
        
        const mask = Array(pick.p.length).fill('_').join('');
        
        update(ref(db, 'rooms/' + ROOM), {
            currentWord: { p: pick.p, d: pick.d, mask: mask }
        });
        
        if (ROLE === 'host') startWordTimers(pick.p);
    }

    function startWordTimers(word) {
        clearInterval(revealInterval);
        let maskArr = Array(word.length).fill('_');
        
        revealInterval = setInterval(() => {
            let hiddenIdx = [];
            maskArr.forEach((c, i) => { if(c === '_') hiddenIdx.push(i); });

            if (hiddenIdx.length > 1) {
                const rand = hiddenIdx[Math.floor(Math.random() * hiddenIdx.length)];
                maskArr[rand] = word[rand];
                update(ref(db, 'rooms/' + ROOM + '/currentWord'), { mask: maskArr.join('') });
            } else {
                clearInterval(revealInterval);
            }
        }, 800);
    }

    // --- HOST ACTIONS ---
    window.handleAction = (type) => {
        if (ROLE !== 'host') return;

        if (type === 'CORRECT') {
            playSound('correct');
            // Trova prossimo vivo
            let next = (GAME_STATE.turn + 1) % GAME_STATE.players.length;
            while (!GAME_STATE.players[next].alive) {
                next = (next + 1) % GAME_STATE.players.length;
            }
            GAME_STATE.turn = next;
            pickNewWord();
        } else if (type === 'SKIP') {
            playSound('skip');
            GAME_STATE.players[GAME_STATE.turn].time -= 3;
            if (GAME_STATE.players[GAME_STATE.turn].time <= 0) {
                GAME_STATE.players[GAME_STATE.turn].time = 0;
                handleElimination();
            } else {
                pickNewWord();
            }
        }
        update(ref(db, 'rooms/' + ROOM), GAME_STATE);
    };

    function handleElimination() {
        GAME_STATE.players[GAME_STATE.turn].alive = false;
        const aliveOnes = GAME_STATE.players.filter(p => p.alive);
        
        if (aliveOnes.length <= 1) {
            GAME_STATE.status = 'ENDED';
            alert("VINCITORE: " + aliveOnes[0].name);
        } else {
            let next = (GAME_STATE.turn + 1) % GAME_STATE.players.length;
            while (!GAME_STATE.players[next].alive) {
                next = (next + 1) % GAME_STATE.players.length;
            }
            GAME_STATE.turn = next;
            pickNewWord();
        }
    }

    // --- TIMER MASTER (HOST) ---
    setInterval(() => {
        if (ROLE === 'host' && GAME_STATE && GAME_STATE.status === 'LIVE') {
            const p = GAME_STATE.players[GAME_STATE.turn];
            p.time--;
            if (p.time <= 0) {
                p.time = 0;
                handleElimination();
            }
            update(ref(db, 'rooms/' + ROOM + '/players'), GAME_STATE.players);
            if (p.time < 10) playSound('tick');
        }
    }, 1000);

    // --- RENDERER ---
    function renderGame() {
        const turnPlayer = GAME_STATE.players[GAME_STATE.turn];
        document.getElementById('turn-announcement').innerText = "TURNO DI: " + turnPlayer.name;
        document.getElementById('definition').innerText = `"${GAME_STATE.currentWord.d}"`;

        const display = document.getElementById('word-display');
        display.innerHTML = '';
        GAME_STATE.currentWord.mask.split('').forEach(char => {
            const div = document.createElement('div');
            div.className = `letter ${char !== '_' ? 'revealed' : ''}`;
            div.innerText = char === '_' ? '' : char;
            display.appendChild(div);
        });

        const board = document.getElementById('players-board');
        board.innerHTML = '';
        GAME_STATE.players.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `p-card ${i === GAME_STATE.turn ? 'active' : ''} ${!p.alive ? 'dead' : ''}`;
            card.innerHTML = `
                <div class="p-name">${p.name}</div>
                <div class="p-time">${Math.max(0, p.time)}s</div>
                <div class="p-diff">${p.diff === 'database_bambino' ? 'BAMBINO' : 'ADULTO'}</div>
            `;
            board.appendChild(card);
        });

        if (ROLE === 'host') {
            document.getElementById('host-solution').innerText = GAME_STATE.currentWord.p.toUpperCase();
        }
    }
</script>
</body>
</html>
